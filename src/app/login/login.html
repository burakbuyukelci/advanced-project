<div style="display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #0f1015; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
  <div style="background: #1a1c23; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 320px; text-align: center; border: 1px solid #2a2d35;">
    <div style="margin-bottom: 30px;">
      <h1 style="color: #fff; margin: 0; font-size: 28px; letter-spacing: 1px;"><span style="color: #8c52ff;">Data</span>Pulse</h1>
      <p style="color: #888; font-size: 14px; margin-top: 5px;">AI Analytics Platform</p>
    </div>
    <input type="text" placeholder="Kullanıcı Adı" style="width: 100%; padding: 12px; margin-bottom: 15px; background: #242731; border: 1px solid #363a45; color: white; border-radius: 6px; box-sizing: border-box; outline: none;">
    <input type="password" placeholder="Şifre" style="width: 100%; padding: 12px; margin-bottom: 25px; background: #242731; border: 1px solid #363a45; color: white; border-radius: 6px; box-sizing: border-box; outline: none;">
    <button (click)="onLogin()" style="width: 100%; padding: 12px; background-color: #8c52ff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s;">Sisteme Giriş Yap</button>
  </div>
</div>
