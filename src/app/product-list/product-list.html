<div style="min-height: 100vh; background-color: #0f1015; padding: 40px; font-family: 'Segoe UI', sans-serif; color: white;">
  <div style="max-width: 1000px; margin: auto;">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2d35; padding-bottom: 20px; margin-bottom: 30px;">
      <h2 style="margin: 0; color: #fff;">Yetkili Ürünlerim <span style="font-size: 14px; color: #8c52ff; background: rgba(140, 82, 255, 0.2); padding: 4px 8px; border-radius: 4px; margin-left: 10px;">Admin Access</span></h2>
      <button routerLink="/login" style="padding: 8px 16px; background: transparent; border: 1px solid #ff4757; color: #ff4757; border-radius: 6px; cursor: pointer;">Çıkış Yap</button>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px;">
      <div *ngFor="let product of products" style="background: #1a1c23; border: 1px solid #2a2d35; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; flex-direction: column; justify-content: space-between;">
        <div>
          <div style="font-size: 40px; margin-bottom: 15px;">{{ product.icon }}</div>
          <h3 style="margin: 0 0 10px 0; color: #fff;">{{ product.name }}</h3>
          <p style="color: #888; font-size: 14px;">Stok Kodu: {{ product.sku }}</p>
        </div>
        <div style="margin-top: 20px; display: flex; justify-content: space-between; align-items: center;">
          <span style="font-size: 22px; color: #2ed573; font-weight: bold;">${{ product.price }}</span>
          <button [routerLink]="['/product', product.id]" style="padding: 10px 15px; background-color: #8c52ff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">Detay & AI Chat</button>
        </div>
      </div>
    </div>
  </div>
</div>
